<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contact Form Submission</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        .container { width: 100%; padding: 20px; background-color: #f5f5f5; }
        .content { max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%); color: #ffffff; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }
        .body { padding: 30px; }
        .field { margin: 20px 0; padding: 15px; background-color: #f8f9fa; border-left: 4px solid #00d9ff; border-radius: 4px; }
        .label { font-weight: bold; color: #2c3e50; margin-bottom: 5px; display: block; }
        .value { color: #34495e; line-height: 1.6; }
        .footer { background-color: #2c3e50; color: #ffffff; padding: 20px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="header">
                <h1>🎯 New Contact Form Submission</h1>
                <p style="margin: 10px 0 0 0; font-size: 14px;">Prime Stack - Contact Form</p>
            </div>
            
            <div class="body">
                <p style="font-size: 16px; color: #2c3e50;">You have received a new inquiry:</p>
                
                <div class="field">
                    <span class="label">👤 Name:</span>
                    <div class="value">{{ name }}</div>
                </div>
                
                <div class="field">
                    <span class="label">📧 Email:</span>
                    <div class="value"><a href="mailto:{{ email }}" style="color: #ff6b35; text-decoration: none;">{{ email }}</a></div>
                </div>
                
                <div class="field">
                    <span class="label">📱 Phone:</span>
                    <div class="value">{{ phone }}</div>
                </div>
                
                <div class="field">
                    <span class="label">📋 Subject:</span>
                    <div class="value">{{ subject }}</div>
                </div>
                
                <div class="field">
                    <span class="label">💬 Message:</span>
                    <div class="value">{{ message }}</div>
                </div>
            </div>
            
            <div class="footer">
                <p style="margin: 0;">This is an automated notification from Prime Stack Contact Form</p>
            </div>
        </div>
    </div>
</body>
</html>
